server:
  port: 8080

spring:
  application:
    name: DocMind
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/kb_system
    username: postgres
    password: 123456
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB

# 数据库配置（第2周学习数据库时再启用）

# MyBatis-Plus配置（第2周学习数据库时再启用）
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.docmind.docmind.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: docmind-secret-key-2024-very-long-secure-key-for-jwt-token-generation
  expiration: 86400000

# 文件上传配置
file:
  upload:
    path: E:/IdeaProjects/DocMind/uploads/